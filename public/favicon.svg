<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#skyGrad)" />

  <!-- Sun (partially behind cloud) -->
  <circle cx="42" cy="22" r="11" fill="url(#sunGrad)" filter="url(#softShadow)" />
  <!-- Sun rays -->
  <g stroke="#f59e0b" stroke-width="2" stroke-linecap="round" opacity="0.9">
    <line x1="42" y1="7"  x2="42" y2="4"  />
    <line x1="53" y1="11" x2="55" y2="9"  />
    <line x1="57" y1="22" x2="60" y2="22" />
    <line x1="53" y1="33" x2="55" y2="35" />
  </g>

  <!-- Cloud body (layered circles) -->
  <g filter="url(#softShadow)">
    <circle cx="24" cy="35" r="10" fill="url(#cloudGrad)" />
    <circle cx="36" cy="30" r="13" fill="url(#cloudGrad)" />
    <circle cx="47" cy="35" r="8"  fill="url(#cloudGrad)" />
    <!-- Fill the flat bottom -->
    <rect x="14" y="35" width="41" height="13" rx="6" fill="url(#cloudGrad)" />
  </g>
</svg>